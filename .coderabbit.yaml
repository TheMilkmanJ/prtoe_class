# Whitelist PRTOE core files only. Do NOT prefix with "!**/*" — that pattern
# makes the local `cr` CLI fail with "All files are ignored".
#
# GitHub full-context workflow (post on PR):
#   @coderabbitai full review
# Persistent learning examples:
#   @coderabbitai Learn: When trans/F_dot/de_mode changes, trace all readers in
#     background.c, background.h, perturbations.c, perturbations.h in one review.
#   @coderabbitai Learn: Every Newtonian metric term needs a synchronous gauge
#     equivalent; report both or flag as incomplete.

language: en-US

tone_instructions: >-
  Exhaustive physics audit, not concise summary. Report every violation of
  CONTEXT.md and PRTOE_Working_Formulation.md. Do not stop after first findings;
  continue until all four core files and cross-file contracts are verified.

reviews:
  profile: assertive

  path_filters:
    - "source/perturbations.c"
    - "source/background.c"
    - "include/perturbations.h"
    - "include/background.h"

  poem: false
  review_details: true
  collapse_walkthrough: false
  changed_files_summary: true

  auto_review:
    auto_incremental_review: false

  tools:
    clang:
      enabled: true
    cppcheck:
      enabled: true

  pre_merge_checks:
    custom_checks:
      - mode: warning
        name: PRTOE CONTEXT contract sweep
        instructions: |
          Before completing the review, verify every item in CONTEXT.md
          "Audit instruction" and "Background contracts" / "Perturbation contracts"
          sections against the whitelisted files. List each contract as PASS or FAIL.
          If any FAIL, report as Major findings. Do not mark review complete with
          unchecked contracts.

      - mode: warning
        name: PRTOE fix impact trace
        instructions: |
          For every issue found in the diff, perform a mandatory impact sweep:
          (1) list symbols and indices touched; (2) find every read/write site in
          background.c, background.h, perturbations.c, perturbations.h; (3) flag
          downstream inconsistencies in the SAME review (storage vs solver,
          background_functions vs background_derivs, IC vs evolution, sync vs
          Newtonian). Never report an isolated fix without listing affected consumers.

  path_instructions:
    - path: "**/*"
      instructions: |
        EXHAUSTIVE REVIEW MODE — override brevity bias.

        Before analyzing, load CONTEXT.md and PRTOE_Working_Formulation.md as the
        source of truth. Audit code against those constraints; do not guess.

        Perform a comprehensive sweep of the entire PR diff AND the full content of
        each whitelisted file. Do not stop at the first few findings. Continue until
        you have verified all logical dependencies between background.c, background.h,
        perturbations.c, and perturbations.h.

        MANDATORY FIX IMPACT PROTOCOL (every finding):
        - Primary bug: file:line, contract violated, proposed fix.
        - Impact sweep: grep mentally for all uses of changed symbols (F_dot, trans,
          trans_eom, de_mode, index_bg_*, index_pt_*, rho_prtoe, rho_plus_p_shear,
          prtoe_is_physically_active, prtoe_is_covariantly_active_at_tau).
        - Downstream risks: list sites that must change together; propose fixes now,
          not on a follow-up review.
        - Gauge pairs: if Newtonian path changes, check synchronous equivalent.

        If truncated, continue in a follow-up response. Format: Major | Minor | Nit.

        Secondary verification pass (mandatory before finalizing):
        1. Activation predicates consistent everywhere
        2. F_dot / trans_eom / de_mode aligned in functions + derivs + storage
        3. rho_r budget complete for covariant activation (incl. NCDM 3*p)
        4. p_tot_prime includes PRTOE
        5. IC metric coupling + rho_plus_p_shear seeded
        6. Source terms: no divide-by rho_prtoe below PRTOE_RHO_ACTIVATION_THRESHOLD
        7. Null-limit and unified-dark-sector edge cases

    - path: "**/perturbations.c"
      instructions: |
        Deep line-by-line static analysis per CONTEXT.md. Report every numerical
        hazard (divide by rho_prtoe, p_tot, F), gauge inconsistency, and index bug.
        Cross-check source assembly (delta_scf/theta_scf) with perturbations_derivs.

    - path: "**/background.c"
      instructions: |
        Deep line-by-line static analysis per CONTEXT.md. Report predicate mismatches
        between background_functions and background_derivs. Trace every stored
        index_bg_* slot to perturbation consumers.

    - path: "**/perturbations.h"
      instructions: |
        Audit API surface against source/perturbations.c. Flag every index/gate mismatch.

    - path: "**/background.h"
      instructions: |
        Audit inline helpers and indices against source/background.c and CONTEXT.md.

knowledge_base:
  code_guidelines:
    enabled: true
    filePatterns:
      - path: "CONTEXT.md"
        instructions: |
          Primary audit checklist. Every finding must cite which contract is violated.
          Run full checklist before finalizing; use fix-impact protocol for each item.
      - path: "PRTOE_Working_Formulation.md"
        instructions: |
          Full physics specification for derivation-level disputes.