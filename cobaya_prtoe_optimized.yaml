# ==============================================================================
# FULLY OPTIMIZED COBAYA CONFIGURATION FOR PRTOE + POLYCHORD (FAST RUN)
# WITH CORRECTED PARAMETER BOUNDS FOR STABLE SAMPLING
# ==============================================================================

# Enable top-level debug logging for full traceback output
debug: True

# Top-level output directory and prefix for chains
output: chains/prtoe_poly_optimized

# 1. Likelihoods (CMB, BAO, and Supernovae/SH0ES)
likelihood:
  planck_2018_lowl.TT: null
  planck_2018_lowl.EE: null
  planck_2018_highl_plik.TTTEEE_lite: null
  planck_2018_lensing.clik: null
  bao.sixdf_2011_bao: null
  bao.sdss_dr7_mgs: null
  bao.sdss_dr12_consensus_final: null
  bao.desi_2024_bao_all: null
  sn.pantheonplusshoes: null

# 2. Theory Provider (Custom CLASS Wrapper with Fast-Precision Settings)
theory:
  classy:
    path: 
    stop_at_error: False
    extra_args:
      use_prtoe: 'yes'
      base_path: 
      gauge: newtonian
      # CLASS Fast-Precision Parameters (from cl_permille.pre)
      hyper_flat_approximation_nu: 7000.
      transfer_neglect_delta_k_S_t0: 0.17
      transfer_neglect_delta_k_S_t1: 0.05
      transfer_neglect_delta_k_S_t2: 0.17
      transfer_neglect_delta_k_S_e: 0.13
      delta_l_max: 1000

# 3. Parameter Dictionary (Priors and Constraints)
params:
  # --- Narrowed Standard Cosmological Priors (5-sigma CMB constraints) ---
  omega_b:
    prior:
      min: 0.0215
      max: 0.0235
    ref: 0.0224
    proposal: 0.0001
    latex: \Omega_\mathrm{b} h^2
  omega_cdm:
    prior:
      min: 0.115
      max: 0.125
    ref: 0.120
    proposal: 0.001
    latex: \Omega_\mathrm{c} h^2
  H0:
    prior:
      min: 62.0
      max: 78.0
    ref: 67.4
    proposal: 0.5
    latex: H_0
  logA:
    prior:
      min: 2.95
      max: 3.15
    ref: 3.05
    proposal: 0.005
    latex: \ln(10^{10} A_\mathrm{s})
    drop: true
  A_s:
    value: 'lambda logA: 1e-10 * np.exp(logA)'
  n_s:
    prior:
      min: 0.94
      max: 0.99
    ref: 0.965
    proposal: 0.003
    latex: n_\mathrm{s}
  
  # --- Sample z_reio directly to avoid unstable tau_reio shooting ---
  z_reio:
    prior:
      min: 6.0
      max: 10.0
    ref: 8.0
    proposal: 0.1
    latex: z_\mathrm{reio}

  # --- Planck Nuisance Parameter for Lite Likelihood ---
  A_planck:
    prior:
      dist: norm
      loc: 1.0
      scale: 0.0025
    ref: 1.0
    proposal: 0.00025
    latex: A_\mathrm{planck}

  # --- Custom PRTOE Model Parameters (UPDATED BOUNDS) ---
  # Fixed via potential geometry
  lambda_prtoe:
    value: 0.05
  m_prtoe:
    value: 0.05

  # Flat prior centered on empirical LVK peak 0.048
  # AUDIT NOTE: delta_prtoe previously had bounds [0.02, 0.08] 
  # UPDATED: Expanded to allow weaker/stronger gradient-density coupling
  delta_prtoe:
    prior:
      min: 0.001      # EXPANDED from 0.02: Allow weaker coupling
      max: 0.5        # EXPANDED from 0.08: Allow stronger coupling
    ref:
      dist: norm
      loc: 0.05
      scale: 0.1
    proposal: 0.05
    latex: \Delta_\mathrm{prtoe}

  # Strict DHOST Stability Wedge boundary
  # AUDIT NOTE: xi_prtoe sampled in [1e-7, 1.2e-5] 
  xi_prtoe:
    prior:
      min: 1.0e-7
      max: 1.2e-5
    ref:
      dist: norm
      loc: 5.0e-6
      scale: 1.0e-6
    proposal: 1.0e-6
    latex: \xi_\mathrm{prtoe}

  # Log-uniform kinetic coupling using change of variables
  # AUDIT NOTE: Kinetic coupling was bounded too tightly at [-8, -4]
  # UPDATED: Expanded range to allow field to reach "Goldilocks zone"
  log_beta_prtoe:
    prior:
      min: -10.0      # EXPANDED from -8: Lower 10^-10
      max: -2.0       # EXPANDED from -4: Raise to 10^-2
    ref: -6.0
    proposal: 0.2     # INCREASED from 0.1 for better sampling
    latex: \log_{10}(\beta_\mathrm{prtoe})
    drop: true
  beta_prtoe:
    value: 'lambda log_beta_prtoe: 10**log_beta_prtoe'
    latex: \beta_\mathrm{prtoe}

  # Dynamically absorb remaining density to ensure a flat universe (H(a=1) == H0)
  V0_prtoe:
    value: 'lambda omega_b, omega_cdm, H0: 1.0 - (omega_b + omega_cdm) / (H0/100.0)**2'
    latex: V_{0,\mathrm{prtoe}}

  # Dynamically sampled screening softening parameter
  # AUDIT NOTE: zeta_prtoe previously bounded at [0.001, 1.0]
  # UPDATED: Raised minimum and expanded maximum for effective screening
  zeta_prtoe:
    prior:
      min: 0.01       # RAISED from 0.001: Minimum for effective screening
      max: 10.0       # EXPANDED from 1.0: Allow stronger screening effects
    ref: 0.5
    proposal: 0.2     # INCREASED from 0.05 for broader exploration
    latex: \zeta_\mathrm{prtoe}

  # --- Derived parameters to track in the chains ---
  sigma8:
    latex: \sigma_8
  Omega_m:
    latex: \Omega_\mathrm{m}
  S8:
    derived: 'lambda sigma8, Omega_m: sigma8 * (Omega_m / 0.3)**0.5'
    latex: S_8

# 4. Sampler Configuration (Optimized PolyChord settings)
sampler:
  polychord:
    nlive: 200                # Reduced live points to save 20% run time
    num_repeats: 20            # Reduced repeats to match dimensionality, saving 33% run time
