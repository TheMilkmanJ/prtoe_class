# ==============================================================================
# COBAYA INPUT CONFIGURATION FOR PRTOE + POLYCHORD
# ==============================================================================

# Enable top-level debug logging for full traceback output
debug: True

# Top-level output directory and prefix for chains
output: chains/prtoe_poly

# 1. Likelihoods (CMB, BAO, and Supernovae/SH0ES)
likelihood:
  planck_2018_lowl.TT: null
  planck_2018_lowl.EE: null
  planck_2018_highl_plik.TTTEEE_lite: null
  planck_2018_lensing.clik: null
  bao.sixdf_2011_bao: null
  bao.sdss_dr7_mgs: null
  bao.sdss_dr12_consensus_final: null
  bao.desi_2024_bao_all: null
  sn.pantheonplusshoes: null

# 2. Theory Provider (Custom CLASS Wrapper)
theory:
  classy:
    path: /mnt/c/Users/themi/projects/prtoe_class
    stop_at_error: False
    extra_args:
      use_prtoe: 'yes'
      base_path: /mnt/c/Users/themi/projects/prtoe_class

# 3. Parameter Dictionary (Priors and Constraints)
params:
  # --- Standard Cosmological Parameters ---
  omega_b:
    prior:
      min: 0.019
      max: 0.026
    ref: 0.0224
    proposal: 0.0001
    latex: \Omega_\mathrm{b} h^2
  omega_cdm:
    prior:
      min: 0.10
      max: 0.20
    ref: 0.120
    proposal: 0.001
    latex: \Omega_\mathrm{c} h^2
  H0:
    prior:
      min: 55.0
      max: 85.0
    ref: 67.4
    proposal: 0.5
    latex: H_0
  logA:
    prior:
      min: 1.61
      max: 3.91
    ref: 3.05
    proposal: 0.001
    latex: \ln(10^{10} A_\mathrm{s})
    drop: true
  A_s:
    value: 'lambda logA: 1e-10 * np.exp(logA)'
  n_s:
    prior:
      min: 0.8
      max: 1.2
    ref: 0.965
    proposal: 0.005
    latex: n_\mathrm{s}
  
  # --- Sample z_reio directly to avoid unstable tau_reio shooting ---
  z_reio:
    prior:
      min: 5.0
      max: 12.0
    ref: 8.0
    proposal: 0.1
    latex: z_\mathrm{reio}

  # --- Planck Nuisance Parameter for Lite Likelihood ---
  A_planck:
    prior:
      dist: norm
      loc: 1.0
      scale: 0.0025
    ref: 1.0
    proposal: 0.00025
    latex: A_\mathrm{planck}

  # --- Custom PRTOE Model Parameters ---
  prtoe_xi:
    prior:
      min: 1.0e-9
      max: 1.0e-5
    ref: 1.0e-7
    proposal: 1.0e-8
    latex: \xi_\mathrm{prtoe}
  prtoe_beta:
    prior:
      min: 0.0
      max: 1.0e-4
    ref: 1.0e-6
    proposal: 1.0e-7
    latex: \beta_\mathrm{prtoe}
  prtoe_lambda:
    prior:
      min: 0.0
      max: 1.0
    ref: 0.10
    proposal: 0.01
    latex: \lambda_\mathrm{prtoe}
  prtoe_mass:
    prior:
      min: 1.0e-22
      max: 1.0e-19
    ref: 1.0e-20
    proposal: 1.0e-21
    latex: m_\mathrm{prtoe}
  prtoe_v0:
    prior:
      min: 0.0
      max: 2.0
    ref: 0.685
    proposal: 0.05
    latex: v_{0,\mathrm{prtoe}}

# 4. Sampler Configuration (PolyChord Nested Sampler)
sampler:
  polychord:
    nlive: 250                # Number of live points (adjust based on speed vs precision)
    num_repeats: 30            # Number of repeats for reliability in degenerated spaces
