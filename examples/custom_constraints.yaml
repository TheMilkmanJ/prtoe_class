# ==============================================================================
# 🌌 CosmicDashboard: General-Purpose Physical Constraint Examples
# ==============================================================================
#
# This file provides concrete, copy-pasteable examples of model-agnostic physical 
# constraints for several popular non-standard cosmological models.
#
# IMPORTANT: The optimizer reads the "physical_constraints" key (singular).
# Uncomment the section for your model and ensure it uses the key "physical_constraints".
# Only one section should be active at a time.
#
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. Early Dark Energy (EDE) Models
# ------------------------------------------------------------------------------
# EDE models introduce a scalar field that behaves as dark energy at early times
# (near matter-radiation equality) to reduce the sound horizon and increase H0.
#
# Physical constraints prevent unphysically large EDE fractions that would ruin
# CMB/LSS fitting, or critical redshifts that lie outside the radiation era.
# Uncomment the block below to use EDE constraints:
#
# physical_constraints:
#   # Peak EDE fraction must be within a reasonable physical range (0.02 to 0.20)
#   - name: "ede_fraction_limit"
#     expression: "f_EDE"
#     min: 0.01
#     max: 0.25
#     weight: 1000.0
#
#   # Critical redshift (log10(z_c)) must lie in the radiation era (3.0 to 4.5)
#   - name: "ede_critical_redshift"
#     expression: "log10z_c"
#     min: 3.2
#     max: 4.2
#     weight: 500.0
#
#   # Combined constraint: ensure EDE field doesn't decay too slowly (theta_i)
#   - name: "ede_initial_theta"
#     expression: "theta_i_ede"
#     min: 0.1
#     max: 3.1416
#     weight: 100.0


# ------------------------------------------------------------------------------
# 2. Axion / Ultra-Light Axion (ULA) Dark Matter
# ------------------------------------------------------------------------------
# ULAs act as fuzzy dark matter. The axion mass (m_a) and decay constant (f_a)
# determine the relic density and Jeans scale.
#
# Physical constraints enforce astrophysical bounds (such as stellar cooling
# limits and Lyman-alpha forest constraints on the axion mass).
# Uncomment the block below to use Axion constraints:
#
# physical_constraints:
#   # Axion mass log10(m_a/eV) must be heavy enough to avoid Lyman-alpha constraints
#   - name: "axion_mass_lyman_limit"
#     expression: "log10m_axion"
#     min: -22.0
#     max: -18.0
#     weight: 300.0
#
#   # relic density of axions must not exceed the total DM density (derived check)
#   - name: "axion_relic_density"
#     derived: "omega_axion"
#     min: 0.0
#     max: 0.125
#     weight: 800.0


# ------------------------------------------------------------------------------
# 3. Hu-Sawicki f(R) Gravity Models
# ------------------------------------------------------------------------------
# f(R) gravity modifies the Einstein-Hilbert action to explain acceleration.
# The parameter f_R0 (value of df/dR today) determines the screening scale.
#
# Physical constraints prevent solar system screening violations (f_R0 < 1e-5)
# and ensure the model does not suffer from tachyonic instabilities.
# Uncomment the block below to use f(R) constraints:
#
# physical_constraints:
#   # Solar system tests require the Compton parameter log10(|f_R0|) < -5.0
#   - name: "fr0_screening_limit"
#     expression: "log10_fr0"
#     min: -8.0
#     max: -5.0
#     weight: 500.0
#
#   # Ensure the background expansion does not deviate too much from LCDM (H0 check)
#   - name: "fr_background_h0"
#     expression: "H0"
#     min: 65.0
#     max: 75.0
#     weight: 100.0


# ------------------------------------------------------------------------------
# 4. Decaying Dark Matter (DDM) Models
# ------------------------------------------------------------------------------
# Dark matter decays into radiation (or dark radiation), reducing the matter
# density at late times and affecting S8.
#
# Physical constraints limit the decay rate (Gamma) to ensure enough dark matter
# survives to form galaxies.
# Uncomment the block below to use DDM constraints:
#
# physical_constraints:
#   # Decay rate log10(Gamma / Gyr^-1) must be small enough (DM must be stable enough)
#   - name: "ddm_decay_rate_limit"
#     expression: "log10_decay_rate"
#     min: -5.0
#     max: -1.0
#     weight: 600.0
#
#   # Derived check: fraction of decayed dark matter today must be less than 10%
#   - name: "ddm_decayed_fraction"
#     derived: "f_decayed"
#     min: 0.0
#     max: 0.10
#     weight: 1000.0
