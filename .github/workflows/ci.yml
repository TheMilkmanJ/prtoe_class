name: CosmicDashboard CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install deps
      run: |
        pip install -r requirements.txt
        pip install pytest
    - name: Lint (basic)
      run: |
        python -m py_compile scripts/cosmo_dashboard_backend.py
    - name: Run tests
      run: |
        cd tests
        python -m pytest test_dashboard.py -q --tb=short
    - name: Docker build test
      run: |
        docker build --build-arg DASHBOARD_USER=admin . -t cosmic-test

  # Add more: mypy, full integration with mocks
