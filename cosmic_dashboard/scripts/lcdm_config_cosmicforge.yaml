      N_ncdm: 1
      T_ncdm: 0.71611
    ignore_obsolete: false
    use_renames: false
params:
  omega_b:
    prior:
      min: 0.02
      max: 0.025
    ref: 0.0224
    proposal: 0.0001
    latex: \Omega_\mathrm{b} h^2
  omega_cdm:
    prior:
      min: 0.11
      max: 0.13
    ref: 0.12
    proposal: 0.001
    latex: \Omega_\mathrm{c} h^2
  H0:
    prior:
      min: 62.0
      max: 80.0
    ref: 67.4
    proposal: 0.5
    latex: H_0
  logA:
    prior:
      min: 2.9
      max: 3.25
    ref: 3.05
    proposal: 0.005
    latex: \ln(10^{10} A_\mathrm{s})
    drop: true
  A_s:
    value: 'lambda logA: 1e-10 * np.exp(logA)'
  n_s:
    prior:
      min: 0.9
      max: 1.09
    ref: 0.965
    proposal: 0.004
    latex: n_\mathrm{s}
  z_reio:
    prior:
      min: 5.0
      max: 12.0
    ref: 8.0
    proposal: 0.1
    latex: z_\mathrm{reio}
  m_ncdm:
    prior:
      min: 0.0
      max: 0.5
    ref: 0.06
    proposal: 0.02
    latex: \sum m_\nu \[\mathrm{eV}\]
  A_planck:
    prior:
      dist: norm
      loc: 1.0
      scale: 0.0025
    ref: 1.0
    proposal: 0.00025
    latex: A_\mathrm{planck}
sampler:
  polychord:
    nlive: 200
    nprior: 800
    num_repeats: 10
    precision_criterion: 0.01
