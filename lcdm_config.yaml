# ==============================================================================
# POLYCHORD CONFIGURATION FOR STANDARD ΛCDM
# ==============================================================================

output: chains/lcdm_polychord

likelihood:
  planck_2018_lowl.TT: null
  planck_2018_lowl.EE: null
  planck_2018_highl_plik.TTTEEE_lite: null
  planck_2018_lensing.clik: null
  bao.sixdf_2011_bao: null
  bao.sdss_dr7_mgs: null
  bao.sdss_dr12_consensus_final: null
  bao.desi_2024_bao_all: null
  sn.pantheonplusshoes: null

theory:
  classy:
    path: "/home/themilkmanj/prtoe_class"
    stop_at_error: False
    extra_args:
      use_prtoe: 'no'
      N_ur: 2.0328
      N_ncdm: 1
      T_ncdm: 0.71611

params:
  omega_b:
    prior: {min: 0.0215, max: 0.0235}
    ref: 0.0224
    proposal: 0.0001
    latex: \Omega_\mathrm{b} h^2
  omega_cdm:
    prior: {min: 0.115, max: 0.125}
    ref: 0.120
    proposal: 0.001
    latex: \Omega_\mathrm{c} h^2
  H0:
    prior: {min: 62.0, max: 78.0}
    ref: 67.4
    proposal: 0.5
    latex: H_0
  logA:
    prior: {min: 2.95, max: 3.15}
    ref: 3.05
    proposal: 0.005
    latex: \ln(10^{10} A_\mathrm{s})
    drop: true
  A_s:
    value: 'lambda logA: 1e-10 * np.exp(logA)'
    latex: A_\mathrm{s}
  n_s:
    prior: {min: 0.94, max: 0.99}
    ref: 0.965
    proposal: 0.003
    latex: n_\mathrm{s}
  z_reio:
    prior: {min: 6.0, max: 10.0}
    ref: 8.0
    proposal: 0.1
    latex: z_\mathrm{reio}
  m_ncdm:
    value: 0.06
    latex: \sum m_\nu \ [\mathrm{eV}]
  A_planck:
    prior: {dist: norm, loc: 1.0, scale: 0.0025}
    ref: 1.0
    proposal: 0.00025
    latex: A_\mathrm{planck}

sampler:
  polychord:
    nlive: 200
    num_repeats: 20
    precision_criterion: 0.001